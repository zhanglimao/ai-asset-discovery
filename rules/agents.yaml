      scan_paths:
        - path: "~/.vscode/extensions"
          label: "VS Code"
        - path: "~/.vscode-oss/extensions"
          label: "VS Code OSS"
        - path: "~/.cursor/extensions"
          label: "Cursor"
        - path: "~/.windsurf/extensions"
          label: "Windsurf"
    features:
      extensions:
        - "GitHub.copilot-chat"
      agent_signals:
        - "createAgent"
        - "registerAgent"
        - "tool_use"
        - "onAgent:copilot"
    skills:
      enabled: true

