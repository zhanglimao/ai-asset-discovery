  - name: github-copilot
    display_name: "GitHub Copilot"
    description: "GitHub Copilot AI coding assistant"
    category: "ide_extension"
    min_confidence: possible
    paths:
      - path: ~/.cursor/extensions/GitHub.copilot*
    ide:
      scan_paths:
        - path: "~/.vscode/extensions"
          label: "VS Code"
        - path: "~/.vscode-oss/extensions"
          label: "VS Code OSS"
        - path: "~/.cursor/extensions"
          label: "Cursor"
        - path: "~/.windsurf/extensions"
          label: "Windsurf"
    features:
      extensions:
        - "GitHub.copilot"
      binaries:
        - copilot
    skills:
      enabled: true

  - name: github-copilot-agent
    display_name: "GitHub Copilot Agent"
    description: "GitHub Copilot with agent mode enabled (Copilot Chat extension)"
    category: "ide_extension"
