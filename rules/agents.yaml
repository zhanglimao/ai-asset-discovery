version: "1.0"

agents:
  # ============================================================
  # IDE Extensions (VS Code / Cursor)
  # ============================================================
  - name: github-copilot
    display_name: "GitHub Copilot"
    description: "GitHub Copilot AI coding assistant"
    category: "ide_extension"
    min_confidence: possible
    paths:
      - path: ~/.cursor/extensions/GitHub.copilot*
    features:
      extensions:
        - "GitHub.copilot"
      binaries:
        - copilot

  - name: github-copilot-agent
    display_name: "GitHub Copilot Agent"
    description: "GitHub Copilot with agent mode enabled"
    category: "ide_extension"
    min_confidence: possible
    paths:
      - path: ~/.cursor/extensions/GitHub.copilot*
    features:
      extensions:
        - "GitHub.copilot"
      agent_signals:
        - "createAgent"
        - "registerAgent"
        - "tool_use"

  - name: cline
    display_name: "Cline"
    description: "Cline AI coding agent for VS Code"
    category: "ide_extension"
    min_confidence: possible
    paths:
      - path: ~/.cline
    features:
      extensions:
        - "saoudrizwan.claude-dev"
      agent_signals:
        - "createAgent"
        - "tool_use"
    skills:
      enabled: true
      scan_paths:
        - ~/.cline/skills
      keywords:
        - skill
        - description
        - tool
        - prompt

  - name: continue
    display_name: "Continue"
    description: "Continue open-source AI code assistant"
    category: "ide_extension"
    min_confidence: possible
    paths:
