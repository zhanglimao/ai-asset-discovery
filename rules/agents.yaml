  # ============================================================
  # CLI Agents (Process + Binary + Package detection)
  # ============================================================
  - name: aider
    display_name: "Aider"
    description: "Aider AI pair programming tool"
    category: "cli_agent"
    min_confidence: possible
    paths:
      - path: ~/.aider.conf.yml
    features:
      processes:
        - aider
      binaries:
        - aider
      packages:
        - aider-chat
      version_regex: "aider[- ]v?([0-9]+\\.[0-9]+\\.[0-9]+)"
      version_flag: "--version"
    probe:
      command: aider
      args: ["--version"]
      version_regex: "aider[- ]v?([0-9]+\\.[0-9]+\\.[0-9]+)"
    config:
      format: env
      paths:
        - ~/.aider.conf.yml
        - .env
      field_map:
        model: "AIDER_MODEL"
        api_key: "OPENAI_API_KEY"
        editor: "AIDER_EDITOR"
    skills:
      enabled: true

